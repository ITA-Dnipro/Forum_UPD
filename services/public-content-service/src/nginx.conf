worker_processes 1;
events {
    worker_connections 1024;
}

http {
    include /app/mime.types;
    default_type  application/octet-stream;

    lua_shared_dict my_cache 10m;

    server {
        listen 8085;

        location / {
            default_type 'text/plain';
            content_by_lua_block {
                local main = require "main" 
                ngx.say( main.say_hello())
            }
        }

    }
}


